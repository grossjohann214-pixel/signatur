version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: singulai-postgres
    environment:
      POSTGRES_DB: singulai_validate
      POSTGRES_USER: singulai
      POSTGRES_PASSWORD: singulai_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - singulai-network

  redis:
    image: redis:7-alpine
    container_name: singulai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - singulai-network

  minio:
    image: minio/minio:latest
    container_name: singulai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - singulai-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  singulai-network:
    driver: bridge
